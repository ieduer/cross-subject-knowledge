name: Deploy to VPS
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/cross-subject-knowledge
            git pull origin main
            chmod +x scripts/deploy_vps.sh
            ./scripts/deploy_vps.sh
