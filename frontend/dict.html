<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>实虚词典 · AI 高中教材</title>
    <meta name="robots" content="index, follow">
    <link rel="icon" href="https://img.bdfz.net/20250503004.webp" type="image/jpeg">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css?v=20260310h">
    <link rel="stylesheet" href="assets/dict.css?v=20260310h">
</head>

<body class="dict-page">
    <div id="app">
        <header class="header">
            <div class="header-inner">
                <div class="logo">
                    <a href="/" class="dict-home-link">
                        <span class="logo-icon">🔗</span>
                        <span class="logo-text">AI 高中教材</span>
                        <span class="logo-badge">BETA</span>
                    </a>
                </div>
                <nav class="nav">
                    <a href="/" class="nav-btn">搜索</a>
                    <a href="/?view=gaokao" class="nav-btn">📝 真题</a>
                    <a href="/?view=insights" class="nav-btn">📊 数据</a>
                    <a href="/?view=graph" class="nav-btn">知识图谱</a>
                    <a href="/dict.html" class="nav-btn active">实虚词典</a>
                </nav>
            </div>
        </header>

        <main class="dict-view">
            <section class="dict-hero">
                <div class="dict-search-box">
                    <span class="dict-search-icon">🔍</span>
                    <input id="dict-input" type="text" placeholder="输入字或词，如：之、乎、者、也、已、焉、哉…" autocomplete="off">
                    <button id="dict-search-btn" type="button">查典</button>
                </div>
            </section>



            <section id="dict-empty" class="dict-empty">
                <div class="dict-suggestions">
                    <button class="dict-suggestion" type="button" data-dict-suggestion="之">之</button>
                    <button class="dict-suggestion" type="button" data-dict-suggestion="乎">乎</button>
                    <button class="dict-suggestion" type="button" data-dict-suggestion="者">者</button>
                    <button class="dict-suggestion" type="button" data-dict-suggestion="也">也</button>
                    <button class="dict-suggestion" type="button" data-dict-suggestion="已">已</button>
                    <button class="dict-suggestion" type="button" data-dict-suggestion="焉">焉</button>
                    <button class="dict-suggestion" type="button" data-dict-suggestion="哉">哉</button>
                </div>
            </section>

            <section id="dict-results" class="dict-results hidden">
                <div class="dict-columns">
                    <article class="dict-panel">
                        <div class="dict-panel-head">
                            <h2>教材古文 / 古诗词</h2>
                            <span id="tb-count" class="dict-count">0</span>
                        </div>
                        <div id="tb-results" class="dict-panel-body"></div>
                    </article>

                    <div class="dict-side-stack">
                        <article class="dict-panel">
                            <div class="dict-panel-head">
                                <h2>馆藏辞典原页</h2>
                                <span id="dict-count" class="dict-count">0</span>
                            </div>
                            <div id="dict-entries" class="dict-panel-body"></div>
                        </article>
                    </div>
                </div>

                <article class="dict-panel dict-panel-wide">
                    <div class="dict-panel-head">
                        <h2>真题中的古文 / 古诗词</h2>
                        <span id="gk-count" class="dict-count">0</span>
                    </div>
                    <div id="gk-results" class="dict-panel-body dict-panel-body-wide"></div>
                </article>

                <article class="dict-chat">
                    <div class="dict-chat-head">
                        <h2>AI 学习助手</h2>
                        <button id="chat-copy-btn" class="dict-chat-copy hidden" type="button">复制全文</button>
                    </div>
                    <div id="chat-messages" class="dict-chat-messages"></div>
                    <div class="dict-chat-compose">
                        <textarea id="chat-input" rows="2" placeholder="继续追问…"></textarea>
                        <button id="chat-send-btn" type="button" disabled>➤</button>
                    </div>
                </article>
            </section>
        </main>

        <div id="page-modal" class="page-modal hidden" aria-hidden="true">
            <button id="page-modal-close" class="page-modal-close" type="button" aria-label="关闭">×</button>
            <div class="page-modal-inner">
                <img id="page-modal-image" src="" alt="原文页图">
                <div class="page-modal-toolbar">
                    <span id="page-modal-title" class="page-modal-title">原文页图</span>
                    <button id="page-modal-prev" type="button">上一页</button>
                    <span id="page-modal-meta">第 0 页</span>
                    <button id="page-modal-next" type="button">下一页</button>
                </div>
            </div>
        </div>

        <footer class="footer">
            <div class="footer-meta">
                <a class="footer-link" href="https://github.com/ieduer/cross-subject-knowledge" target="_blank"
                    rel="noopener noreferrer">GitHub</a>
                <a class="footer-link"
                    href="https://github.com/ieduer/cross-subject-knowledge/issues/new?title=%5BFeedback%5D%20sun.bdfz.net%20&body=%23%23%20%E9%97%AE%E9%A2%98%E6%88%96%E5%BB%BA%E8%AE%AE%0A%0A%23%23%20%E6%A3%80%E7%B4%A2%E8%AF%8D%0A%0A%23%23%20%E5%AF%B9%E5%BA%94%E9%A1%B5%E9%9D%A2%2F%E4%B9%A6%E7%B1%8D%0A%0A%23%23%20%E5%A4%8D%E7%8E%B0%E6%AD%A5%E9%AA%A4"
                    target="_blank" rel="noopener noreferrer">反馈建议</a>
                <a class="footer-link" href="https://bdfz.net/posts/sun/" target="_blank"
                    rel="noopener noreferrer">作者说</a>
            </div>
        </footer>
    </div>
    <script src="assets/dict.js?v=20260310h"></script>
</body>

</html>
