<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="北大附中 孙玉磊">
    <title>AI 高中教材 · 北大附中</title>
    <meta name="robots" content="index, follow">
    <link rel="icon" href="https://img.bdfz.net/20250503004.webp" type="image/jpeg">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <!-- KaTeX for Math Rendering -->
    <link rel="stylesheet" href="https://unpkg.com/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://unpkg.com/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://unpkg.com/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <link rel="stylesheet" href="assets/style.css?v=20260310d">
</head>

<body>
    <div id="app">
        <!-- Header -->
        <header class="header">
            <div class="header-inner">
                <div class="logo">
                    <span class="logo-icon">🔗</span>
                    <span class="logo-text">AI 高中教材</span>
                    <span class="logo-badge">BETA</span>
                </div>
                <nav class="nav">
                    <button class="nav-btn active" data-view="search">搜索</button>
                    <button class="nav-btn" data-view="gaokao">📝 真题</button>
                    <button class="nav-btn" data-view="insights">📊 数据</button>
                    <button class="nav-btn" data-view="graph">知识图谱</button>
                    <a href="/dict.html" class="nav-btn">实虚词典</a>
                </nav>
            </div>
        </header>

        <!-- Search View -->
        <main id="view-search" class="view active">
            <section class="hero">
                <h1><span class="gradient-text">这世界真的有学科吗？</span></h1>
                <p class="hero-sub" id="hero-sub">覆盖高中 9 科 · 加载中…</p>
                <div class="search-box">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" placeholder="搜索概念，如：蛋白质、勾股定理、丝绸之路…" autocomplete="off">
                    <button id="advanced-toggle" class="advanced-toggle active" title="高级搜索">⚙</button>
                    <button id="search-btn" class="search-submit">搜索</button>
                </div>
                <!-- Advanced Search Panel -->
                <div id="advanced-panel" class="advanced-panel">
                    <div class="filter-row">
                        <div class="filter-group">
                            <label>📚 检索范围</label>
                            <select id="filter-scope">
                                <option value="">全部教材</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>📊 排序</label>
                            <select id="filter-sort">
                                <option value="relevance">相关度优先</option>
                                <option value="cross">跨学科数优先</option>
                                <option value="images">含图优先</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label class="checkbox-label">
                                <input type="checkbox" id="filter-images"> 📷 仅含图结果
                            </label>
                        </div>
                    </div>
                </div>
                <div class="quick-tags">
                    <span class="tag-label">试试：</span>
                    <div class="concept-carousel" id="concept-carousel"></div>
                </div>
                <!-- Trending Searches -->
                <div id="trending-section" class="trending-section hidden">
                    <div id="trending-popular" class="trending-group hidden">
                        <span class="trending-label">🔥 热门</span>
                        <div class="trending-tags" id="trending-popular-tags"></div>
                    </div>
                </div>
            </section>

            <!-- Stats bar (loaded dynamically) -->
            <section id="stats-bar" class="stats-bar hidden"></section>

            <!-- Cross hint -->
            <div id="cross-hint" class="cross-hint hidden"></div>

            <!-- Query analysis -->
            <div id="query-analysis" class="query-analysis hidden"></div>

            <!-- Related concepts -->
            <div id="related-bar" class="related-bar hidden"></div>

            <!-- AI Synthesis Panel -->
            <div id="ai-panel" class="ai-panel hidden">
                <div class="ai-toolbar">
                    <button id="ai-btn" class="ai-btn">
                        <span class="ai-sparkle">✨</span> AI 教材解读
                    </button>
                    <button id="ai-copy-btn" class="ai-copy-btn hidden" type="button" title="复制全部对话"
                        aria-label="复制全部对话">⧉</button>
                </div>
                <div id="ai-starters" class="ai-starters"></div>
                <div id="ai-result" class="ai-result hidden">
                    <div class="ai-result-header">
                        <span>✨ AI 教材对话</span>
                        <span class="ai-model">Gemini</span>
                    </div>
                    <div id="ai-content" class="ai-content"></div>
                    <div class="ai-compose">
                        <textarea id="ai-followup-input" class="ai-followup-input" placeholder="继续追问，例如：这个概念在教材中的定义是什么？"
                            rows="2"></textarea>
                        <button id="ai-send-btn" class="ai-send-btn" type="button">发送</button>
                    </div>
                </div>
            </div>

            <!-- Subject filter tabs -->
            <div id="subject-tabs" class="subject-tabs hidden"></div>

            <!-- Results -->
            <section id="results" class="results"></section>
        </main>

        <!-- Gaokao View -->
        <main id="view-gaokao" class="view">
            <section class="gaokao-hero">
                <h2>📝 高考真题库</h2>
                <p id="gk-hero-sub" class="gaokao-hero-sub">真题库统计加载中…</p>
            </section>

            <!-- Gaokao Filters -->
            <div class="gaokao-filters">
                <div class="filter-group">
                    <label>📚 学科</label>
                    <select id="gk-subject">
                        <option value="">全部学科</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📅 年份</label>
                    <select id="gk-year">
                        <option value="">全部年份</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📋 卷种</label>
                    <select id="gk-category">
                        <option value="">全部卷种</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>📊 题型</label>
                    <select id="gk-type">
                        <option value="">全部题型</option>
                        <option value="objective">客观题</option>
                        <option value="subjective">主观题</option>
                    </select>
                </div>
                <button id="gk-search-btn" class="gk-search-btn">搜索真题</button>
            </div>

            <div id="gk-count" class="gk-count hidden"></div>
            <section id="gk-results" class="gk-results"></section>

            <!-- Textbook Download Link -->
            <div class="gk-download-link">
                <a href="https://jks.bdfz.net/" target="_blank" class="download-btn">
                    📥 教材 PDF 下载 · jks.bdfz.net
                </a>
            </div>

            <!-- Gaokao Link Panel (modal) -->
            <div id="gk-link-panel" class="gk-link-panel hidden">
                <div class="gk-link-inner">
                    <div class="gk-link-header">
                        <h3>📚 教材关联分析</h3>
                        <button id="gk-link-close" class="gk-link-close">✕</button>
                    </div>
                    <div id="gk-link-content" class="gk-link-content"></div>
                </div>
            </div>
        </main>

        <!-- Data Insights View -->
        <main id="view-insights" class="view">
            <div class="insights-header">
                <h2><span class="gradient-text">📊 数据洞察</span></h2>
                <p>基于 726 个精选学术术语的深度分析</p>
            </div>
            <div class="insights-tabs">
                <button class="insight-tab active" data-panel="freq">📈 词频分析</button>
                <button class="insight-tab" data-panel="heatmap">🔥 学科关联</button>
                <button class="insight-tab" data-panel="coverage">🎯 考试覆盖</button>
                <button class="insight-tab" data-panel="breadth">🌐 概念广度</button>
            </div>
            <div class="insights-content">
                <!-- Word Frequency Panel -->
                <div id="panel-freq" class="insight-panel active">
                    <div class="freq-controls">
                        <select id="freq-source">
                            <option value="all">全部数据</option>
                            <option value="textbook">仅教材</option>
                            <option value="gaokao">仅真题</option>
                        </select>
                        <select id="freq-subject">
                            <option value="">全部学科</option>
                        </select>
                    </div>
                    <div id="freq-chart" class="chart-container"></div>
                </div>
                <!-- Heatmap Panel -->
                <div id="panel-heatmap" class="insight-panel">
                    <div id="heatmap-chart" class="chart-container"></div>
                </div>
                <!-- Coverage Panel -->
                <div id="panel-coverage" class="insight-panel">
                    <div class="coverage-section">
                        <h3>🔴 隐性考点 — 真题高频但教材少提</h3>
                        <div id="coverage-hidden" class="coverage-list"></div>
                    </div>
                    <div class="coverage-section">
                        <h3>🔵 低效学习 — 教材反复出现但真题少考</h3>
                        <div id="coverage-low" class="coverage-list"></div>
                    </div>
                </div>
                <!-- Concept Breadth Panel -->
                <div id="panel-breadth" class="insight-panel">
                    <div id="breadth-chart" class="chart-container"></div>
                </div>
            </div>
        </main>

        <!-- Graph View -->
        <main id="view-graph" class="view">
            <div class="graph-header">
                <h2>🔗 知识图谱</h2>
                <p>基于精选学术术语 · 节点大小=关联强度 · 点击概念搜索</p>
                <div class="graph-controls">
                    <button class="graph-mode active" data-mode="cross">🌐 跨学科</button>
                    <button class="graph-mode" data-mode="subject">📚 学科内</button>
                    <select id="graph-subject-select" class="graph-subject-select" style="display:none;">
                        <option value="">选择学科...</option>
                    </select>
                </div>
            </div>
            <div id="graph-container" class="graph-container"></div>
        </main>

        <footer class="footer">
            <p id="footer-version-line">重构版本加载中…</p>
            <div class="footer-meta">
                <a class="footer-link" href="https://github.com/ieduer/cross-subject-knowledge" target="_blank"
                    rel="noopener noreferrer">GitHub</a>
                <a class="footer-link"
                    href="https://github.com/ieduer/cross-subject-knowledge/issues/new?title=%5BFeedback%5D%20sun.bdfz.net%20&body=%23%23%20%E9%97%AE%E9%A2%98%E6%88%96%E5%BB%BA%E8%AE%AE%0A%0A%23%23%20%E6%A3%80%E7%B4%A2%E8%AF%8D%0A%0A%23%23%20%E5%AF%B9%E5%BA%94%E9%A1%B5%E9%9D%A2%2F%E4%B9%A6%E7%B1%8D%0A%0A%23%23%20%E5%A4%8D%E7%8E%B0%E6%AD%A5%E9%AA%A4"
                    target="_blank" rel="noopener noreferrer">反馈建议</a>
                <a class="footer-link" href="https://bdfz.net/posts/sun/" target="_blank"
                    rel="noopener noreferrer">作者说</a>
            </div>
        </footer>
    </div>
    <script src="assets/app.js?v=20260310d"></script>
</body>

</html>
